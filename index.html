<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick City Brawl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 14px; left: 16px;
      color: #fff;
      font-size: 13px;
      line-height: 1.8;
      pointer-events: none;
    }
    #hud .lbl { color: #00ffcc; font-weight: bold; letter-spacing: 1px; }
    #hud .val { color: #fff; }

    /* status / waiting message */
    #status {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }

    /* health bar */
    #health-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    #health-bg {
      width: 140px; height: 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 2px;
      overflow: hidden;
    }
    #health-fill {
      height: 100%;
      width: 100%;
      background: #00ff88;
      transition: width 0.1s, background 0.2s;
    }

    /* frag counter */
    #frags {
      margin-top: 6px;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .p1col { color: #ff4422; font-weight: bold; }
    .p2col { color: #2299ff; font-weight: bold; }

    /* powerup */
    #powerup-hud { margin-top: 6px; min-height: 1.4em; }

    /* ── minimap ── */
    #minimap {
      position: absolute;
      bottom: 18px; right: 18px;
      width: 170px; height: 170px;
      border: 2px solid #00ffcc;
      border-radius: 4px;
      background: rgba(5, 8, 20, 0.85);
    }

    /* ── controls hint ── */
    #hint {
      position: absolute;
      bottom: 18px; left: 16px;
      color: #556; font-size: 11px;
      pointer-events: none;
      line-height: 1.7;
    }

    /* ── centre flash ── */
    #flash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 38px; font-weight: bold;
      color: #ffee00;
      text-shadow: 0 0 24px #ff8800;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
    }

    /* ── death overlay ── */
    #dead-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(180,0,0,0.35);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="status">CONNECTING…</div>
    <div id="health-row">
      <span class="lbl">HP&nbsp;</span>
      <div id="health-bg"><div id="health-fill"></div></div>
      <span class="val" id="health-val">100</span>
    </div>
    <div id="frags">
      <span class="p1col">P1 ▸ <span id="p1-frags">0</span></span>
      &nbsp;&nbsp;
      <span class="p2col">P2 ▸ <span id="p2-frags">0</span></span>
    </div>
    <div id="powerup-hud"></div>
  </div>

  <canvas id="minimap"></canvas>
  <div id="flash"></div>
  <div id="dead-overlay"></div>

  <div id="hint">
    W / ↑ &nbsp;Throttle &nbsp;|&nbsp; S / ↓ &nbsp;Brake/Reverse<br>
    A / ← &nbsp;Steer left &nbsp;|&nbsp; D / → &nbsp;Steer right<br>
    SPACE &nbsp;Handbrake &nbsp;|&nbsp; Ram enemy to deal damage
  </div>

  <script type="module" src="/src/game.js"></script>
</body>
</html>
