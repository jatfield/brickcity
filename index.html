<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick City</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    /* ── P1 HUD (top-left, red) ── */
    #p1hud {
      position: absolute; top: 14px; left: 16px;
      color: #fff; font-size: 13px; line-height: 1.8;
      pointer-events: none;
    }
    #p1hud .pname { color: #ff3300; font-weight: bold; font-size: 15px;
                    text-shadow: 0 0 8px #ff3300; }
    #p1hud .lbl   { color: #ff9977; font-weight: bold; letter-spacing: 1px; }
    #p1hud .val   { color: #fff; }

    /* ── P2 HUD (top-right, blue) ── */
    #p2hud {
      position: absolute; top: 14px; right: 16px;
      color: #fff; font-size: 13px; line-height: 1.8;
      pointer-events: none; text-align: right;
    }
    #p2hud .pname { color: #3399ff; font-weight: bold; font-size: 15px;
                    text-shadow: 0 0 8px #3399ff; }
    #p2hud .lbl   { color: #77aaff; font-weight: bold; letter-spacing: 1px; }
    #p2hud .val   { color: #fff; }

    /* ── HP bars ── */
    .hpwrap { display:inline-block; width:110px; height:7px;
              background:#333; border-radius:3px; vertical-align:middle;
              margin: 0 5px; }
    .hpbar  { height:100%; border-radius:3px; transition:width .12s; }
    #p1bar  { background:#ff3300; }
    #p2bar  { background:#3399ff; }

    /* ── minimap ── */
    #minimap {
      position: absolute; bottom: 18px; right: 18px;
      width: 170px; height: 170px;
      border: 2px solid #445566; border-radius: 4px;
      background: rgba(5,8,20,.85);
    }

    /* ── controls hint ── */
    #hint {
      position: absolute; bottom: 18px; left: 16px;
      color: #445; font-size: 11px; pointer-events: none; line-height: 1.7;
    }

    /* ── centre flash ── */
    #flash {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 36px; font-weight: bold; color: #ffee00;
      text-shadow: 0 0 20px #ff8800;
      pointer-events: none; opacity: 0; transition: opacity .2s;
    }

    /* ── connecting overlay ── */
    #connecting {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: #00ffcc; font-size: 20px;
      text-shadow: 0 0 12px #00ffcc;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Player 1 -->
  <div id="p1hud">
    <div class="pname">P1 — RED</div>
    <div><span class="lbl">HP&nbsp;&nbsp;&nbsp;</span><span class="hpwrap"><span class="hpbar" id="p1bar" style="width:100%"></span></span><span class="val" id="p1hp">100</span></div>
    <div><span class="lbl">FRAGS&nbsp;</span><span class="val" id="p1frags">0</span></div>
    <div><span class="lbl">SPEED&nbsp;</span><span class="val" id="p1speed">0</span> km/h</div>
    <div id="p1pwr" style="margin-top:4px;min-height:1.4em;"></div>
  </div>

  <!-- Player 2 -->
  <div id="p2hud">
    <div class="pname">P2 — BLUE</div>
    <div><span class="val" id="p2hp">–</span><span class="hpwrap"><span class="hpbar" id="p2bar" style="width:0%"></span></span><span class="lbl">&nbsp;HP</span></div>
    <div><span class="val" id="p2frags">0</span><span class="lbl">&nbsp;FRAGS</span></div>
    <div id="p2status" style="color:#556;font-size:11px;">waiting for P2…</div>
  </div>

  <canvas id="minimap"></canvas>
  <div id="flash"></div>
  <div id="connecting">Connecting…</div>

  <div id="hint">
    WASD / ↑↓←→ &nbsp;Drive &nbsp;|&nbsp; SPACE &nbsp;Handbrake<br>
    Each player uses their own keyboard on a separate browser tab
  </div>

  <script type="module" src="/src/game.js"></script>
</body>
</html>
