<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick City Racer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 14px; left: 16px;
      color: #fff;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
      text-shadow: 0 0 6px #0ff, 0 0 12px #0ff;
    }
    #hud .lbl { color: #00ffcc; font-weight: bold; letter-spacing: 1px; }
    #hud .val { color: #ffffff; }
    #bestlap  { color: #ffcc00; font-size: 11px; }

    /* ── minimap ── */
    #minimap {
      position: absolute;
      bottom: 18px; right: 18px;
      width: 170px; height: 170px;
      border: 2px solid #00ffcc;
      border-radius: 4px;
      background: rgba(5, 8, 20, 0.85);
    }

    /* ── controls hint ── */
    #hint {
      position: absolute;
      bottom: 18px; left: 16px;
      color: #556; font-size: 11px;
      pointer-events: none;
      line-height: 1.7;
    }

    /* ── lap flash ── */
    #lapflash {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px; font-weight: bold;
      color: #ffee00;
      text-shadow: 0 0 20px #ff8800;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="lbl">SPEED&nbsp;</span><span class="val" id="speed">0</span> km/h</div>
    <div><span class="lbl">LAP&nbsp;&nbsp;&nbsp;</span><span class="val" id="lap">1 / 3</span></div>
    <div><span class="lbl">SPLIT&nbsp;</span><span class="val" id="time">0:00.000</span></div>
    <div id="bestlap">BEST &nbsp;–</div>
  </div>

  <canvas id="minimap"></canvas>
  <div id="lapflash"></div>

  <div id="hint">
    W / ↑ &nbsp;Throttle &nbsp;|&nbsp; S / ↓ &nbsp;Brake/Reverse<br>
    A / ← &nbsp;Steer left &nbsp;|&nbsp; D / → &nbsp;Steer right<br>
    SPACE &nbsp;Handbrake
  </div>

  <script type="module" src="/src/game.js"></script>
</body>
</html>
